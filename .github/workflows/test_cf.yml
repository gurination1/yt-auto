name: Test Cloudflare Impersonation
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install curl_cffi
        run: pip install curl_cffi
      - name: Run Test
        run: |
          python -c "
          from curl_cffi import requests
          try:
              r = requests.post('https://rumble.com/service.php?name=user.get_salts', data={'username': 'gurination24@gmail.com'}, impersonate='chrome')
              print('STATUS_CODE:', r.status_code)
              print('RESPONSE_TEXT:', r.text)
          except Exception as e:
              print('ERROR:', e)
          "
