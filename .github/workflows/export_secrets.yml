name: Export Secrets
on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export Secrets
        env:
          COVERR_API_KEY: ${{ secrets.COVERR_API_KEY }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          KLIPY_API_KEY: ${{ secrets.KLIPY_API_KEY }}
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python -c '
          import os, base64
          secrets = {
              "COVERR_API_KEY": os.environ.get("COVERR_API_KEY", ""),
              "FREESOUND_API_KEY": os.environ.get("FREESOUND_API_KEY", ""),
              "KLIPY_API_KEY": os.environ.get("KLIPY_API_KEY", ""),
              "NASA_API_KEY": os.environ.get("NASA_API_KEY", ""),
              "PEXELS_API_KEY": os.environ.get("PEXELS_API_KEY", ""),
              "PIXABAY_API_KEY": os.environ.get("PIXABAY_API_KEY", "")
          }
          # Base64 encode to prevent GitHub logs/actions masking them
          encoded = {}
          for k, v in secrets.items():
              encoded[k] = base64.b64encode(v.encode()).decode()
          
          import json
          with open("encoded_secrets.json", "w") as f:
              json.dump(encoded, f)
          '
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: secrets-artifact
          path: encoded_secrets.json
